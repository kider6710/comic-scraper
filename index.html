<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的專屬漫畫情報站</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif, '微軟正黑體';
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            padding: 30px;
            max-width: 900px;
            width: 100%;
        }
        h1 { color: #2c3e50; text-align: center; border-bottom: 3px solid #3498db; padding-bottom: 10px; }
        
        .calendar-header { display: flex; justify-content: center; align-items: center; margin-bottom: 20px; }
        #month-selector { font-size: 1.2em; font-weight: bold; padding: 8px 15px; border-radius: 8px; border: 2px solid #3498db; color: #2c3e50; background-color: #f8f9fa; cursor: pointer; outline: none; transition: all 0.3s; }
        #month-selector:hover { background-color: #e8f4fd; }
        
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; text-align: center; }
        .day-name { font-weight: bold; color: #7f8c8d; padding-bottom: 10px; }
        .day-cell { padding: 15px; border-radius: 8px; background-color: #f9f9f9; border: 1px solid #eee; transition: all 0.3s ease; }
        .has-data { background-color: #e8f4fd; border-color: #3498db; color: #2980b9; cursor: pointer; font-weight: bold; box-shadow: 0 2px 5px rgba(52,152,219,0.3); }
        .has-data:hover { background-color: #3498db; color: white; transform: translateY(-3px); }
        
        #detail-section { margin-top: 30px; padding-top: 20px; border-top: 2px dashed #ddd; display: none; }
        .controls-area { background: #fdfefe; padding: 15px; border-radius: 8px; border: 1px solid #e1e8ed; margin-bottom: 20px; display: flex; gap: 20px; align-items: center; flex-wrap: wrap; }
        .controls-area select { padding: 8px; border-radius: 5px; border: 1px solid #bdc3c7; outline: none; font-family: inherit; }
        
        .publisher-title { color: #e67e22; border-left: 5px solid #e67e22; padding-left: 10px; margin-top: 25px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.95em; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ecf0f1; vertical-align: middle; }
        th { background-color: #f8f9f9; color: #7f8c8d; }
        tr:hover { background-color: #fdfdfd; }
        
        .cover-img { max-width: 75px; border-radius: 6px; box-shadow: 0 3px 6px rgba(0,0,0,0.15); transition: transform 0.3s; }
        .cover-img:hover { transform: scale(1.1); }
        .series-badge { background-color: #9b59b6; color: white; padding: 4px 10px; border-radius: 15px; font-size: 0.85em; font-weight: bold; display: inline-block; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📅 專屬漫畫出版月曆</h1>
        
        <div class="calendar-header">
            <select id="month-selector">
                <option value="">正在翻閱帳本尋找歷史月份...</option>
            </select>
        </div>
        
        <div class="calendar-grid" id="calendar-body">
        </div>

        <div id="detail-section">
            <h2 id="detail-date-title">請點選月曆上有標示的日期</h2>
            
            <div id="controls" class="controls-area" style="display:none;">
                <label>🔍 <strong>篩選系列：</strong>
                    <select id="series-filter"><option value="all">所有系列</option></select>
                </label>
                <label>↕️ <strong>排序方式：</strong>
                    <select id="sort-select">
                        <option value="default">預設排序</option>
                        <option value="title">依書名排序</option>
                        <option value="series">依系列排序</option>
                    </select>
                </label>
            </div>

            <div id="detail-content"></div>
        </div>
    </div>

    <script>
        let globalComicData = {};
        let currentDayData = null; 
        let availableMonths = []; 

        const filterSelect = document.getElementById('series-filter');
        const sortSelect = document.getElementById('sort-select');
        const monthSelector = document.getElementById('month-selector');

        filterSelect.addEventListener('change', () => renderContent());
        sortSelect.addEventListener('change', () => renderContent());

        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const response = await fetch('data.json');
                globalComicData = await response.json();
            } catch (error) {
                console.error("找不到帳本", error);
                monthSelector.innerHTML = '<option>無法載入資料庫，請確認已上傳至 GitHub</option>';
                return;
            }

            const monthSet = new Set();
            for (const dateString in globalComicData) {
                const yyyyMm = dateString.substring(0, 7);
                monthSet.add(yyyyMm);
            }
            
            availableMonths = Array.from(monthSet).sort().reverse();
            
            if (availableMonths.length === 0) {
                monthSelector.innerHTML = '<option>目前沒有任何情報</option>';
                return;
            }

            monthSelector.innerHTML = ''; 
            availableMonths.forEach(yyyyMm => {
                const [year, month] = yyyyMm.split('-');
                const option = document.createElement('option');
                option.value = yyyyMm;
                option.innerText = `${year} 年 ${parseInt(month, 10)} 月`;
                monthSelector.appendChild(option);
            });

            monthSelector.addEventListener('change', (e) => {
                const [year, month] = e.target.value.split('-');
                renderCalendar(parseInt(year, 10), parseInt(month, 10) - 1);
            });

            const [latestYear, latestMonth] = availableMonths[0].split('-');
            renderCalendar(parseInt(latestYear, 10), parseInt(latestMonth, 10) - 1);
        });

        function renderCalendar(year, month) {
            const calendarBody = document.getElementById('calendar-body');
            
            calendarBody.innerHTML = `
                <div class="day-name">日</div><div class="day-name">一</div><div class="day-name">二</div>
                <div class="day-name">三</div><div class="day-name">四</div><div class="day-name">五</div><div class="day-name">六</div>
            `;
            
            document.getElementById('detail-section').style.display = 'none';

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();

            for (let i = 0; i < firstDay; i++) {
                calendarBody.appendChild(document.createElement('div'));
            }

            for (let day = 1; day <= daysInMonth; day++) {
                const cell = document.createElement('div');
                cell.className = 'day-cell';
                cell.innerText = day;

                const dateString = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;

                if (globalComicData[dateString]) {
                    cell.classList.add('has-data');
                    cell.title = "點擊查看今日情報！";
                    cell.addEventListener('click', () => {
                        showDetails(dateString, globalComicData[dateString]);
                    });
                }
                calendarBody.appendChild(cell);
            }
        }

        function showDetails(dateStr, dayData) {
            currentDayData = dayData;
            document.getElementById('detail-section').style.display = 'block';
            document.getElementById('detail-date-title').innerText = `✨ ${dateStr} 漫畫情報 ✨`;
            document.getElementById('controls').style.display = 'flex';

            let seriesSet = new Set();
            for (let pub in dayData) {
                dayData[pub].forEach(book => {
                    if (book.series && book.series !== "無系列資訊") seriesSet.add(book.series);
                });
            }
            
            filterSelect.innerHTML = '<option value="all">所有系列</option>';
            seriesSet.forEach(s => {
                filterSelect.innerHTML += `<option value="${s}">${s}</option>`;
            });
            sortSelect.value = 'default';

            renderContent(); 
        }

        function renderContent() {
            const contentDiv = document.getElementById('detail-content');
            contentDiv.innerHTML = '';

            const filterVal = filterSelect.value;
            const sortVal = sortSelect.value;

            for (const publisher in currentDayData) {
                let books = currentDayData[publisher];

                if (filterVal !== 'all') {
                    books = books.filter(b => b.series === filterVal);
                }
                if (books.length === 0) continue;

                let displayBooks = [...books];
                if (sortVal === 'title') {
                    displayBooks.sort((a, b) => a.title.localeCompare(b.title, 'zh-TW'));
                } else if (sortVal === 'series') {
                    displayBooks.sort((a, b) => (a.series || '').localeCompare(b.series || '', 'zh-TW'));
                }

                let html = `<h3 class="publisher-title">🏢 ${publisher}</h3>`;
                html += `<table><tr>
                            <th style="text-align:center;">🖼️ 封面</th>
                            <th>📘 書名</th>
                            <th>✍️ 作者</th>
                            <th>🏷️ 集數</th>
                            <th>📚 系列</th>
                         </tr>`;
                
                displayBooks.forEach(book => {
                    let imgHtml = book.cover ? `<img src="${book.cover}" class="cover-img">` : '<span style="color:#bdc3c7;">無圖片</span>';
                    let seriesHtml = (book.series && book.series !== "無系列資訊") ? `<span class="series-badge">${book.series}</span>` : '<span style="color:#bdc3c7;">-</span>';
                    
                    html += `<tr>
                                <td style="width: 90px; text-align: center;">${imgHtml}</td>
                                <td><strong>${book.title}</strong></td>
                                <td>${book.author}</td>
                                <td>${book.volume}</td>
                                <td>${seriesHtml}</td>
                            </tr>`;
                });
                html += `</table>`;
                
                contentDiv.innerHTML += html;
            }

            if (contentDiv.innerHTML === '') {
                contentDiv.innerHTML = '<p style="text-align:center; padding: 20px; color:#95a5a6;">目前沒有符合篩選條件的漫畫喔！</p>';
            }
        }
    </script>
</body>
</html>
