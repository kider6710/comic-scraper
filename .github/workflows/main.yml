name: 東立新書自動探測特務

on:
  schedule:
    # 每天下午 2 點自動執行 (UTC 06:00 = 台灣 14:00)
    - cron: '0 6 * * *'
  workflow_dispatch: # 方便主人隨時手動發動攻擊

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 複製雲端倉庫檔案
        uses: actions/checkout@v3

      - name: 設定 Python 環境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 安裝必要套件
        run: |
          pip install requests beautifulsoup4

      - name: 執行深度爬蟲特務
        # 在此處領取保險箱裡的替身密碼
        env:
          PROXY_URL: ${{ secrets.PROXY_URL }}
        run: python comic.py

      - name: 將最新情報裝箱並推回倉庫
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          # 關鍵的一步：將變動後的 data.json 裝箱
          git add .
          # 檢查是否有新情報，有的話才進行提交
          git diff --quiet && git diff --staged --quiet || (git commit -m "更新最新漫畫情報: $(date +'%Y-%m-%d')" && git push)
